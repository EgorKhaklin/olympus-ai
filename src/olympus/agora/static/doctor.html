<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agora — Doctor</title>
    <style>/*__AGORA_CSS__*/</style>
</head>
<body>
__AGORA_NAV__

<main>
    <header class="page-head">
        <h1>Doctor</h1>
        <div class="subtitle">single-screen health diagnostic · honest about warnings</div>
        <div class="status-strip">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">connecting…</span>
            &nbsp;·&nbsp; live from <code>/doctor</code>
        </div>
    </header>

    <section class="grid" id="summary"></section>

    <section class="panel">
        <h2>Findings</h2>
        <div class="panel-body" id="findings">loading…</div>
    </section>
</main>

<footer class="agora-foot">
    The doctor is honest — if it says <span class="badge warn">warn</span> it means it.
</footer>

<script>/*__AGORA_JS__*/</script>
<script>
"use strict";

function renderSummary(report) {
    var root = document.getElementById("summary");
    root.innerHTML = "";
    var tiles = [
        ["Overall",
         (report.ok_count || 0) + " ok",
         (report.warn_count || 0) + " warn · " + (report.fail_count || 0) + " fail"],
        ["Olympus", report.olympus_version || "?", "version"],
        ["Platform", report.platform || "?", report.python_version || ""],
        ["Diagnosed", (report.diagnosed_at || "").substring(11, 19), "(UTC)"],
    ];
    tiles.forEach(function (t) {
        root.appendChild(AGORA.el("div", {"class": "card"}, [
            AGORA.el("div", {"class": "label", text: t[0]}),
            AGORA.el("div", {"class": "value", text: String(t[1])}),
            AGORA.el("div", {"class": "annot", text: String(t[2])}),
        ]));
    });
}

function renderFindings(findings) {
    var body = document.getElementById("findings");
    body.innerHTML = "";
    if (!findings || !findings.length) {
        body.innerHTML = "<p><em>no findings yet</em></p>";
        return;
    }
    var table = AGORA.el("table", {"class": "iris"});
    var thead = AGORA.el("thead", null, [
        AGORA.el("tr", null, [
            AGORA.el("th", {text: "check"}),
            AGORA.el("th", {text: "status"}),
            AGORA.el("th", {text: "detail"}),
        ]),
    ]);
    var tbody = AGORA.el("tbody");
    findings.forEach(function (f) {
        var badge = AGORA.el("span", {
            "class": "badge " + (f.status || ""),
            text: f.status || "?",
        });
        tbody.appendChild(AGORA.el("tr", null, [
            AGORA.el("td", {"class": "mono", text: f.name || ""}),
            AGORA.el("td", null, [badge]),
            AGORA.el("td", {text: f.detail || ""}),
        ]));
    });
    table.appendChild(thead); table.appendChild(tbody);
    body.appendChild(table);
}

function refresh() {
    AGORA.get("/doctor", function (err, report) {
        if (err) {
            AGORA.setStatus(false, "error: " + err.message);
            return;
        }
        AGORA.setStatus(true, "live");
        renderSummary(report);
        renderFindings(report.findings || []);
    });
}
refresh();
setInterval(refresh, AGORA.INTERVAL_MS);
</script>
</body>
</html>
